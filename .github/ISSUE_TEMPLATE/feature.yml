name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see added.
  - type: textarea
    id: proposal
    attributes:
      label: Feature description
      description: What should the dashboard do?
      placeholder: Describe the feature and its use case.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or references.
    validations:
      required: false
